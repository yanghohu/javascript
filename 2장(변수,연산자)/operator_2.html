<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연산자</title>
</head>
<body>
     
    <script> 
        window.onload = function() {
            let list = "";
            let num = 10; // number 타입
            // 복합대입 연사자를 list변수에 문자열을 누적하고 있다.
            list += "<ul>";
            list += "    <li>안녕</li>";
            list += "    <li>자바스크립트</li>";
            list += "</ul>";
            num  += 10;  num  += 10;
            num  += 10;  num  += 10;
            document.body.innerHTML = list;
            document.body.innerHTML = num;
        }
    </script>
</body>
</html>
